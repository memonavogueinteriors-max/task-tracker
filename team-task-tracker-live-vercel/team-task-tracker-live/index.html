<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1730" />
  <title>Team Task Tracker</title>
  <style>
    :root{
      --primary:#C9A84C;--header:#0B1730;--header2:#1A3560;--bg:#F4F7FB;
      --card:#fff;--text:#172033;--muted:#748095;--line:#E4EAF1;
      --green:#2F855A;--red:#C53030;--orange:#C05621;--blue:#2B6CB0;--purple:#6B46C1;
      --shadow:0 10px 30px rgba(15,31,55,.09);--radius:16px;
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,var(--header),var(--header2));position:relative;overflow:hidden}
    .login:before,.login:after{content:"";position:absolute;border-radius:50%;filter:blur(4px);opacity:.2;background:var(--primary)}
    .login:before{width:380px;height:380px;left:-150px;top:-120px}.login:after{width:300px;height:300px;right:-120px;bottom:-100px}
    .login-card{width:min(430px,100%);background:#fff;border-radius:24px;padding:34px;box-shadow:0 30px 80px rgba(0,0,0,.3);position:relative;z-index:1}
    .brand{display:flex;align-items:center;gap:12px}.brand-logo,.avatar{display:grid;place-items:center;flex:0 0 auto;font-weight:900}
    .brand-logo{width:52px;height:52px;border-radius:13px;background:var(--primary);color:var(--header);overflow:hidden}.brand-logo img{width:100%;height:100%;object-fit:contain;background:#fff}
    .brand h1{font-size:20px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}
    .login-card h2{font-size:25px;margin:30px 0 6px}.login-card>.sub{margin:0 0 22px;color:var(--muted);font-size:14px}
    .field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}.field label{font-size:11px;text-transform:uppercase;letter-spacing:.65px;font-weight:800;color:#5F6B7A}
    .input,.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff;color:var(--text);outline:none}
    .field input:focus,.field select:focus,.field textarea:focus,.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 18%,transparent)}
    .field textarea{min-height:82px;resize:vertical}.btn{border:0;border-radius:10px;padding:10px 15px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.18s}
    .btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--primary),color-mix(in srgb,var(--primary) 70%,#fff));color:var(--header)}
    .btn-dark{background:linear-gradient(135deg,var(--header),var(--header2));color:#fff}.btn-light{background:#F3F6FA;color:#344055;border:1px solid var(--line)}
    .btn-danger{background:#FFF5F5;color:var(--red);border:1px solid #FED7D7}.btn-green{background:#F0FFF4;color:var(--green);border:1px solid #9AE6B4}.btn-sm{padding:7px 10px;font-size:12px}.full{width:100%}
    .error,.success,.notice{padding:10px 12px;border-radius:9px;font-size:13px;margin:10px 0}.error{background:#FFF5F5;border:1px solid #FEB2B2;color:var(--red)}.success{background:#F0FFF4;border:1px solid #9AE6B4;color:var(--green)}.notice{background:#FFFAF0;border:1px solid #FBD38D;color:#744210}
    .hint{text-align:center;color:var(--muted);font-size:12px;margin:14px 0 0}
    .app{min-height:100vh}.header{background:linear-gradient(135deg,var(--header),var(--header2));color:#fff;box-shadow:0 5px 24px rgba(11,23,48,.25);position:sticky;top:0;z-index:50}
    .header-inner{max-width:1500px;margin:auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:18px}.header .brand h1{color:#fff}.header .brand p{color:rgba(255,255,255,.6)}
    .header-actions{display:flex;align-items:center;gap:9px}.icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;position:relative}
    .badge{position:absolute;right:-5px;top:-5px;background:#E53E3E;color:#fff;border-radius:999px;min-width:19px;height:19px;padding:0 5px;display:grid;place-items:center;font-size:10px;font-weight:900;border:2px solid var(--header)}
    .user-chip{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 6px;background:rgba(255,255,255,.09);border-radius:999px}.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:var(--header);font-size:11px}
    .user-chip strong{font-size:12px;display:block}.user-chip span{font-size:10px;color:rgba(255,255,255,.6);text-transform:capitalize}
    .layout{max-width:1500px;margin:auto;display:grid;grid-template-columns:225px 1fr;min-height:calc(100vh - 68px)}.sidebar{padding:22px 14px;border-right:1px solid var(--line);background:#fff}
    .nav-title{font-size:10px;color:#A0A8B5;font-weight:900;text-transform:uppercase;letter-spacing:.8px;padding:0 10px;margin-bottom:8px}.nav-btn{width:100%;border:0;background:transparent;color:#536074;border-radius:10px;padding:11px 12px;text-align:left;font-weight:750;margin-bottom:4px}
    .nav-btn:hover{background:#F5F7FA}.nav-btn.active{background:color-mix(in srgb,var(--primary) 17%,#fff);color:var(--header);box-shadow:inset 3px 0 var(--primary)}
    .content{padding:24px;min-width:0}.page-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:18px}.page-head h2{margin:0 0 4px;font-size:25px}.page-head p{margin:0;color:var(--muted);font-size:13px}
    .grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:18px}.stat,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.stat{padding:18px}.stat .label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.6px}.stat .value{font-size:28px;font-weight:900;margin-top:7px}.stat .meta{font-size:11px;color:var(--muted);margin-top:4px}
    .card{padding:19px;margin-bottom:16px}.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}.card-head h3{font-size:16px;margin:0}.card-head p{font-size:12px;color:var(--muted);margin:3px 0 0}
    .two-col{grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr)}.three-col{grid-template-columns:repeat(3,minmax(0,1fr))}.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.form-grid .wide{grid-column:span 2}.form-grid .all{grid-column:1/-1}
    .attendance{display:flex;align-items:end;gap:12px;flex-wrap:wrap}.attendance .field{margin:0;min-width:150px}.status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#CBD5E0;margin-right:6px}.status-dot.on{background:#48BB78}.status-dot.done{background:var(--primary)}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}.table{width:100%;border-collapse:collapse;min-width:760px}.table th{background:#F7F9FC;text-align:left;padding:10px 12px;font-size:10px;color:#778295;text-transform:uppercase;letter-spacing:.55px;white-space:nowrap}.table td{padding:11px 12px;border-top:1px solid #EDF1F5;font-size:12px;vertical-align:middle}.table tr:hover td{background:#FFFDF7}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:900;white-space:nowrap}.p-completed{background:#F0FFF4;color:#276749}.p-progress{background:#EBF8FF;color:#2B6CB0}.p-pending{background:#FFFAF0;color:#C05621}.p-hold{background:#F7FAFC;color:#718096}.p-review{background:#FAF5FF;color:#6B46C1}.p-owner{background:#FFF8DD;color:#744210}.p-manager{background:#EBF8FF;color:#2B6CB0}.p-sales{background:#F0FFF4;color:#276749}
    .actions{display:flex;gap:6px;flex-wrap:wrap}.empty{text-align:center;padding:42px 20px;color:var(--muted)}.empty .emoji{font-size:38px;margin-bottom:9px}
    .day-block{border:1px solid var(--line);border-radius:15px;overflow:hidden;background:#fff;box-shadow:var(--shadow);margin-bottom:14px}.day-head{background:linear-gradient(135deg,var(--header),var(--header2));color:#fff;padding:14px 17px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.day-title{display:flex;gap:12px;align-items:center}.day-num{font-size:28px;color:var(--primary);font-weight:900}.day-title strong{display:block}.day-title small,.day-meta{color:rgba(255,255,255,.65);font-size:11px}.finished{background:var(--primary);color:var(--header);padding:5px 9px;border-radius:999px;font-size:10px;font-weight:900}.day-body{padding:0}
    .modal-back{position:fixed;inset:0;background:rgba(7,15,30,.66);z-index:100;display:grid;place-items:center;padding:18px}.modal{background:#fff;border-radius:18px;width:min(560px,100%);max-height:90vh;overflow:auto;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.3)}.modal.large{width:min(780px,100%)}.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.modal-head h3{margin:0}.close{border:0;background:#F3F6FA;width:34px;height:34px;border-radius:9px;font-size:18px}
    .notification-panel{position:fixed;right:18px;top:70px;width:min(390px,calc(100vw - 36px));max-height:70vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:15px;box-shadow:0 20px 55px rgba(0,0,0,.2);z-index:90}.np-head{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.notif{padding:13px 15px;border-bottom:1px solid #EEF2F6;font-size:12px}.notif.unread{background:#FFFDF3;border-left:3px solid var(--primary)}.notif time{display:block;color:var(--muted);font-size:10px;margin-top:5px}
    .logo-preview{width:90px;height:90px;border-radius:14px;border:1px dashed #C8D0DB;display:grid;place-items:center;overflow:hidden;background:#F8FAFC}.logo-preview img{width:100%;height:100%;object-fit:contain}.color-row{display:flex;gap:10px;align-items:center}.color-row input[type=color]{width:48px;height:40px;padding:3px;border:1px solid var(--line);border-radius:9px;background:#fff}
    .loading{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--muted)}.spinner{width:34px;height:34px;border:4px solid #DDE4EC;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:auto auto 12px}@keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:12px 16px;border-radius:11px;color:#fff;font-weight:800;font-size:12px;box-shadow:0 12px 30px rgba(0,0,0,.22)}.toast.ok{background:#276749}.toast.err{background:#C53030}
    @media(max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:760px){.header-inner{padding:10px 12px}.header .brand p,.user-chip div{display:none}.layout{display:block}.sidebar{position:sticky;top:62px;z-index:40;display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line);padding:8px;background:#fff}.nav-title{display:none}.nav-btn{width:auto;white-space:nowrap;margin:0 4px;padding:9px 12px}.content{padding:14px}.page-head{align-items:center}.page-head h2{font-size:21px}.stats{grid-template-columns:1fr 1fr;gap:10px}.stat{padding:14px}.stat .value{font-size:22px}.form-grid{grid-template-columns:1fr}.form-grid .wide,.form-grid .all{grid-column:auto}.card{padding:14px}.header-actions .btn{display:none}}
    @media(max-width:430px){.stats{grid-template-columns:1fr}.login-card{padding:25px}.content{padding:10px}.page-head{flex-direction:column}.attendance{align-items:stretch}.attendance .field{width:100%}.attendance .btn{width:100%}}
  </style>
</head>
<body>
  <div id="root"><div class="loading"><div><div class="spinner"></div>Loading tracker…</div></div></div>
  <div id="toast"></div>
<script>
'use strict';

const state = {
  token: localStorage.getItem('tt_live_token') || '',
  user: null, company: null, members: [], tasks: [], attendance: [], notifications: [],
  tab: 'work', workDate: localDate(), recordMember: 'all', taskFilterMember: 'all', taskFilterStatus: 'all',
  modal: null, editingTask: null, editingMember: null, notificationsOpen: false, busy: false
};
let pollTimer = null;

function localDate(date = new Date()) {
  const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,'0'), d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function esc(value='') { return String(value).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
function initials(name='User') { return name.split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase(); }
function niceRole(role='') { return role === 'sales' ? 'Team Member (Sales)' : role.charAt(0).toUpperCase()+role.slice(1); }
function formatDate(value) { if(!value) return ''; return new Date(value+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'2-digit',month:'short',year:'numeric'}); }
function dateParts(value) { const d=new Date(value+'T00:00:00'); return {num:String(d.getDate()).padStart(2,'0'),day:d.toLocaleDateString(undefined,{weekday:'long'}),month:d.toLocaleDateString(undefined,{month:'long',year:'numeric'})}; }
function formatDateTime(value) { if(!value) return ''; return new Date(value).toLocaleString(); }
function memberById(id) { return state.members.find(m=>m.id===id); }
function attendanceFor(memberId,date) { return state.attendance.find(a=>a.memberId===memberId&&a.workDate===date); }
function tasksFor(memberId,date) { return state.tasks.filter(t=>t.memberId===memberId&&t.taskDate===date); }
function statusPill(status) { const map={'Completed':'completed','In Progress':'progress','Pending':'pending','On Hold':'hold','Review':'review'}; return `<span class="pill p-${map[status]||'pending'}">${esc(status)}</span>`; }
function rolePill(role) { return `<span class="pill p-${esc(role)}">${esc(niceRole(role))}</span>`; }
function isOwner(){return state.user?.role==='owner'} function isManager(){return state.user?.role==='manager'} function isSales(){return state.user?.role==='sales'}
function visibleMembers(){ return state.members; }
function canManageTeam(){ return isOwner()||isManager(); }
function allowedAssignees(){ return canManageTeam()?state.members:state.members.filter(m=>m.id===state.user.id); }
function unreadCount(){return state.notifications.filter(n=>!n.readAt).length;}

async function api(action, options={}) {
  const method = options.method || 'GET';
  const headers = {'Accept':'application/json'};
  if (state.token) headers.Authorization = `Bearer ${state.token}`;
  if (options.body !== undefined) headers['Content-Type']='application/json';
  const response = await fetch(`/api?action=${encodeURIComponent(action)}`, { method, headers, body: options.body===undefined?undefined:JSON.stringify(options.body) });
  let data={}; try{data=await response.json();}catch{}
  if(response.status===401 && action!=='login'){ logout(false); throw new Error(data.error||'Session expired.'); }
  if(!response.ok) throw new Error(data.error||'Request failed.');
  return data;
}

function toast(message,type='ok'){
  const el=document.getElementById('toast'); if(!el)return;
  el.innerHTML=`<div class="toast ${type==='err'?'err':'ok'}">${esc(message)}</div>`;
  setTimeout(()=>{el.innerHTML='';},3500);
}
function setBrand(){
  const c=state.company||{};
  document.documentElement.style.setProperty('--primary',c.primary_color||'#C9A84C');
  document.documentElement.style.setProperty('--header',c.header_color||'#0B1730');
  document.documentElement.style.setProperty('--header2',c.header_color_2||'#1A3560');
  document.title=(c.name||'Team Task Tracker')+' — Task Tracker';
}
function brandLogo(size='normal'){
  const logo=state.company?.logo_data_url;
  return `<div class="brand-logo">${logo?`<img src="${esc(logo)}" alt="logo">`:esc(initials(state.company?.name||'TT'))}</div>`;
}

async function login(event){
  event.preventDefault(); const form=new FormData(event.target); const btn=event.target.querySelector('button');
  const error=document.getElementById('loginError'); error.innerHTML=''; btn.disabled=true; btn.textContent='Signing in…';
  try{
    const data=await api('login',{method:'POST',body:{employeeId:form.get('employeeId'),pin:form.get('pin')}});
    state.token=data.token; localStorage.setItem('tt_live_token',state.token); state.user=data.user; state.company=data.company; setBrand();
    await loadData(); startPolling();
  }catch(e){error.innerHTML=`<div class="error">${esc(e.message)}</div>`;}
  finally{btn.disabled=false;btn.textContent='Sign In →';}
}
function logout(confirmFirst=true){
  if(confirmFirst&&!confirm('Sign out?'))return;
  state.token='';state.user=null;localStorage.removeItem('tt_live_token');clearInterval(pollTimer);pollTimer=null;renderLogin();
}
async function loadData(show=true){
  if(!state.token)return renderLogin();
  try{
    const data=await api('bootstrap');
    Object.assign(state,{user:data.user,company:data.company,members:data.members,tasks:data.tasks,attendance:data.attendance,notifications:data.notifications});
    setBrand(); renderApp();
  }catch(e){ if(show)toast(e.message,'err'); }
}
function startPolling(){function userIsEditing() {
  const el = document.activeElement;

  return Boolean(
    state.modal ||
    (
      el &&
      (
        el.tagName === 'INPUT' ||
        el.tagName === 'TEXTAREA' ||
        el.tagName === 'SELECT' ||
        el.isContentEditable
      )
    )
  );
}

function startPolling() {
  clearInterval(pollTimer);

  pollTimer = setInterval(() => {
    if (
      state.token &&
      !state.busy &&
      !userIsEditing()
    ) {
      loadData(false);
    }
  }, 15000);
}clearInterval(pollTimer);pollTimer=setInterval(()=>{if(state.token&&!state.busy)loadData(false)},15000);}

function renderLogin(){
  const c=state.company||{name:'Team Task Tracker',tagline:'Shared team productivity portal'};setBrand();
  document.getElementById('root').innerHTML=`
    <main class="login"><section class="login-card">
      <div class="brand">${brandLogo()}<div><h1>${esc(c.name||'Team Task Tracker')}</h1><p>${esc(c.tagline||'Shared team productivity portal')}</p></div></div>
      <h2>Welcome back 👋</h2><p class="sub">Sign in with the Employee ID and PIN given by your Owner.</p>
      <form onsubmit="login(event)">
        <div class="field"><label>Employee ID</label><input name="employeeId" autocomplete="username" placeholder="OWNER or EMP-001" required></div>
        <div class="field"><label>PIN</label><input name="pin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" maxlength="8" autocomplete="current-password" placeholder="4–8 digits" required></div>
        <div id="loginError"></div><button class="btn btn-dark full" type="submit">Sign In →</button>
      </form>
      <p class="hint">First Owner login: <strong>OWNER</strong> / <strong>0000</strong></p>
    </section></main>`;
}

function renderApp(){
  if(!state.user)return renderLogin();
  const c=state.company||{}; const tabs=[['work','📋 My Work'],...(canManageTeam()?[['team','👥 Team'],['tasks','✅ Team Tasks']]:[]),['records','📅 Daily Records'],...(isOwner()?[['settings','⚙️ Settings']]:[])];
  document.getElementById('root').innerHTML=`
    <div class="app"><header class="header"><div class="header-inner">
      <div class="brand">${brandLogo()}<div><h1>${esc(c.name||'Team Task Tracker')}</h1><p>${esc(c.tagline||'Team productivity portal')}</p></div></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openRing()" title="Ring">🔔</button>
        <button class="icon-btn" onclick="toggleNotifications()" title="Notifications">🔔${unreadCount()?`<span class="badge">${unreadCount()}</span>`:''}</button>
        <div class="user-chip"><div class="avatar">${esc(initials(state.user.name))}</div><div><strong>${esc(state.user.name)}</strong><span>${esc(niceRole(state.user.role))}</span></div></div>
        <button class="icon-btn" onclick="logout()" title="Sign out">↪</button>
      </div>
    </div></header>
    <div class="layout"><aside class="sidebar"><div class="nav-title">Workspace</div>${tabs.map(([id,label])=>`<button class="nav-btn ${state.tab===id?'active':''}" onclick="goTab('${id}')">${label}</button>`).join('')}</aside>
    <main class="content">${renderCurrentTab()}</main></div></div>
    ${state.notificationsOpen?renderNotifications():''}${renderModal()}`;
}
function goTab(tab){state.tab=tab;state.modal=null;state.notificationsOpen=false;renderApp();}
function renderCurrentTab(){ if(state.tab==='team'&&canManageTeam())return renderTeam();if(state.tab==='tasks'&&canManageTeam())return renderTasks();if(state.tab==='records')return renderRecords();if(state.tab==='settings'&&isOwner())return renderSettings();return renderWork();}

function renderWork(){
  const date=state.workDate;const mine=tasksFor(state.user.id,date);const attendance=attendanceFor(state.user.id,date);const totalHours=mine.reduce((s,t)=>s+Number(t.hours||0),0);const completed=mine.filter(t=>t.status==='Completed').length;
  const companyTasksToday=state.tasks.filter(t=>t.taskDate===date); const stats=canManageTeam()?[
    ['Team Members',state.members.length,'Active users visible to you'],['Tasks on Date',companyTasksToday.length,formatDate(date)],['Completed',companyTasksToday.filter(t=>t.status==='Completed').length,'Across visible team'],['Logged Hours',companyTasksToday.reduce((s,t)=>s+Number(t.hours||0),0).toFixed(1),'Across visible team']
  ]:[['My Tasks',mine.length,formatDate(date)],['Completed',completed,'Tasks completed'],['Hours',totalHours.toFixed(1),'Task hours recorded'],['Day',attendance?.finishedAt?'Finished':attendance?.loginTime?'On Duty':'Not Started',attendance?.loginTime?`${attendance.loginTime} – ${attendance.logoutTime||'…'}`:'Select times below']];
  return `<div class="page-head"><div><h2>My Work</h2><p>Add tasks, select attendance times, and finish the day.</p></div><button class="btn btn-primary" onclick="openRing()">🔔 Ring</button></div>
    <section class="grid stats">${stats.map(s=>`<div class="stat"><div class="label">${esc(s[0])}</div><div class="value">${esc(s[1])}</div><div class="meta">${esc(s[2])}</div></div>`).join('')}</section>
    <section class="card"><div class="card-head"><div><h3>🕘 Attendance</h3><p>You choose the official login and logout times.</p></div><span><span class="status-dot ${attendance?.finishedAt?'done':attendance?.loginTime?'on':''}"></span>${attendance?.finishedAt?'Day Finished':attendance?.loginTime?'On Duty':'Off Duty'}</span></div>
      <div class="attendance"><div class="field"><label>Work Date</label><input type="date" value="${esc(date)}" onchange="changeWorkDate(this.value)"></div><div class="field"><label>Login Time</label><input id="loginTime" type="time" value="${esc(attendance?.loginTime||'09:00')}" ${attendance?.finishedAt?'disabled':''}></div><button class="btn btn-green" onclick="saveAttendance('login')" ${attendance?.finishedAt?'disabled':''}>Save Login</button><div class="field"><label>Logout Time</label><input id="logoutTime" type="time" value="${esc(attendance?.logoutTime||'17:00')}" ${attendance?.finishedAt?'disabled':''}></div><button class="btn btn-danger" onclick="saveAttendance('logout')" ${attendance?.finishedAt?'disabled':''}>Save Logout</button><button class="btn btn-dark" onclick="finishDay()" ${attendance?.finishedAt?'disabled':''}>✅ Finish Day</button></div>
      ${attendance?.finishedAt?`<div class="success">Finished on ${esc(formatDateTime(attendance.finishedAt))}. This day is stored permanently and synced to Google Sheets.</div>`:''}
    </section>
    ${renderAddTaskCard()}
    <section class="card"><div class="card-head"><div><h3>Tasks for ${esc(formatDate(date))}</h3><p>${mine.length} task(s), ${totalHours.toFixed(1)} total hour(s)</p></div></div>${renderTaskTable(mine,true)}</section>
    ${attendance?.finishedAt?renderOneDayBlock(state.user.id,date):''}`;
}
function changeWorkDate(value){state.workDate=value||localDate();renderApp();}

function renderAddTaskCard(){
  const assignees=allowedAssignees();
  return `<section class="card"><div class="card-head"><div><h3>➕ ${canManageTeam()?'Add or Assign Task':'Add Task'}</h3><p>Every saved task is sent to the shared database and Google Sheet.</p></div></div>
    <form class="form-grid" onsubmit="createTask(event)">
      ${canManageTeam()?`<div class="field"><label>Assign To</label><select name="memberId" required>${assignees.map(m=>`<option value="${m.id}" ${m.id===state.user.id?'selected':''}>${esc(m.name)} — ${esc(m.employeeId)}</option>`).join('')}</select></div>`:`<input type="hidden" name="memberId" value="${state.user.id}">`}
      <div class="field wide"><label>Task Name</label><input name="title" placeholder="e.g. Follow up with client" required></div>
      <div class="field"><label>Date</label><input name="taskDate" type="date" value="${esc(state.workDate)}" required></div>
      <div class="field"><label>Hours Taken</label><input name="hours" type="number" min="0" max="24" step="0.25" value="1" required></div>
      <div class="field"><label>Status</label><select name="status">${['Pending','In Progress','Completed','On Hold','Review'].map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="field wide"><label>Notes</label><input name="notes" placeholder="Optional details"></div>
      <div class="field" style="justify-content:end"><label>&nbsp;</label><button class="btn btn-primary" type="submit">Save Task</button></div>
    </form></section>`;
}
async function createTask(event){
  event.preventDefault();const f=new FormData(event.target);state.busy=true;
  try{await api('task.create',{method:'POST',body:{memberId:f.get('memberId'),title:f.get('title'),taskDate:f.get('taskDate'),hours:Number(f.get('hours')),status:f.get('status'),notes:f.get('notes')}});event.target.reset();toast('Task saved and Sheet sync started.');await loadData(false);}catch(e){toast(e.message,'err')}finally{state.busy=false;}
}
async function saveAttendance(type){
  const input=document.getElementById(type==='login'?'loginTime':'logoutTime'); if(!input?.value)return toast('Select a time first.','err');state.busy=true;
  try{await api('attendance.save',{method:'POST',body:{memberId:state.user.id,workDate:state.workDate,[type==='login'?'loginTime':'logoutTime']:input.value}});toast(`${type==='login'?'Login':'Logout'} time saved.`);await loadData(false);}catch(e){toast(e.message,'err')}finally{state.busy=false;}
}
async function finishDay(){
  if(!confirm('Finish this day and create the permanent daily block?'))return;state.busy=true;
  try{await api('day.finish',{method:'POST',body:{memberId:state.user.id,workDate:state.workDate}});toast('Day finished and synced to Google Sheets.');await loadData(false);}catch(e){toast(e.message,'err')}finally{state.busy=false;}
}

function renderTaskTable(tasks,own=false){
  if(!tasks.length)return `<div class="empty"><div class="emoji">📋</div>No tasks found.</div>`;
  return `<div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>Member</th><th>Task</th><th>Hours</th><th>Status</th><th>Assigned By</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tasks.map(t=>{const member=memberById(t.memberId),assigner=memberById(t.assignedBy);return `<tr><td>${esc(t.taskDate)}</td><td><strong>${esc(member?.name||'Unknown')}</strong><br><small>${esc(member?.employeeId||'')}</small></td><td>${esc(t.title)}</td><td>${Number(t.hours).toFixed(2)}</td><td>${statusPill(t.status)}</td><td>${esc(assigner?.name||'Unknown')}</td><td>${esc(t.notes||'—')}</td><td><div class="actions"><button class="btn btn-light btn-sm" onclick="openEditTask('${t.id}')">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Delete</button></div></td></tr>`}).join('')}</tbody></table></div>`;
}
async function deleteTask(id){if(!confirm('Delete this task? It will also be removed from Google Sheets.'))return;try{await api('task.delete',{method:'DELETE',body:{id}});toast('Task deleted.');await loadData(false);}catch(e){toast(e.message,'err')}}
function openEditTask(id){state.editingTask=state.tasks.find(t=>t.id===id);state.modal='task';renderApp();}
async function updateTask(event){event.preventDefault();const f=new FormData(event.target);try{await api('task.update',{method:'PATCH',body:{id:state.editingTask.id,title:f.get('title'),taskDate:f.get('taskDate'),hours:Number(f.get('hours')),status:f.get('status'),notes:f.get('notes')}});state.modal=null;toast('Task updated and Sheet row refreshed.');await loadData(false);}catch(e){toast(e.message,'err')}}

function renderTeam(){
  const managers=state.members.filter(m=>m.role==='manager');
  return `<div class="page-head"><div><h2>${isOwner()?'Team Members':'My Team'}</h2><p>${isOwner()?'Create accounts, assign managers, and manage access.':'Members assigned under your management.'}</p></div>${isOwner()?`<button class="btn btn-primary" onclick="openAddMember()">+ Add Member</button>`:''}</div>
    <section class="grid stats"><div class="stat"><div class="label">Visible Members</div><div class="value">${state.members.length}</div><div class="meta">Including your account</div></div><div class="stat"><div class="label">Managers</div><div class="value">${state.members.filter(m=>m.role==='manager').length}</div><div class="meta">Active managers</div></div><div class="stat"><div class="label">Sales Members</div><div class="value">${state.members.filter(m=>m.role==='sales').length}</div><div class="meta">Active team members</div></div><div class="stat"><div class="label">Tasks</div><div class="value">${state.tasks.length}</div><div class="meta">Visible task records</div></div></section>
    <section class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Member</th><th>Employee ID</th><th>Role</th><th>Reports To</th><th>Tasks</th><th>Hours</th><th>Completion</th><th>Actions</th></tr></thead><tbody>${state.members.map(m=>{const mt=state.tasks.filter(t=>t.memberId===m.id),done=mt.filter(t=>t.status==='Completed').length,hours=mt.reduce((s,t)=>s+Number(t.hours||0),0),manager=memberById(m.managerId);return `<tr><td><strong>${esc(m.name)}</strong><br><small>${esc(m.email||'No email')}</small></td><td><strong>${esc(m.employeeId)}</strong></td><td>${rolePill(m.role)}</td><td>${esc(manager?.name||'—')}</td><td>${mt.length}</td><td>${hours.toFixed(1)}</td><td>${mt.length?Math.round(done/mt.length*100):0}%</td><td><div class="actions">${m.id!==state.user.id?`<button class="btn btn-light btn-sm" onclick="quickAssign('${m.id}')">Assign Task</button><button class="btn btn-light btn-sm" onclick="ringMember('${m.id}')">Ring</button>${isOwner()?`<button class="btn btn-danger btn-sm" onclick="openEditMember('${m.id}')">Manage</button>`:''}`:'Current user'}</div></td></tr>`}).join('')}</tbody></table></div></section>`;
}
function openAddMember(){state.editingMember=null;state.modal='member';renderApp();}
function openEditMember(id){state.editingMember=state.members.find(m=>m.id===id);state.modal='memberEdit';renderApp();}
async function createMember(event){event.preventDefault();const f=new FormData(event.target);try{const data=await api('member.create',{method:'POST',body:{name:f.get('name'),email:f.get('email'),role:f.get('role'),employeeId:f.get('employeeId'),pin:f.get('pin'),managerId:f.get('managerId')}});state.modal=null;toast(`Member created: ${data.member.employeeId}`);await loadData(false);}catch(e){toast(e.message,'err')}}
async function updateMember(event){event.preventDefault();const f=new FormData(event.target);try{await api('member.update',{method:'PATCH',body:{id:state.editingMember.id,name:f.get('name'),email:f.get('email'),managerId:f.get('managerId'),pin:f.get('pin'),active:f.get('active')==='on'}});state.modal=null;toast('Member updated.');await loadData(false);}catch(e){toast(e.message,'err')}}
function quickAssign(memberId){state.tab='work';renderApp();setTimeout(()=>{const select=document.querySelector('select[name=memberId]');if(select)select.value=memberId;document.querySelector('input[name=title]')?.focus();},0)}

function renderTasks(){
  let tasks=[...state.tasks];if(state.taskFilterMember!=='all')tasks=tasks.filter(t=>t.memberId===state.taskFilterMember);if(state.taskFilterStatus!=='all')tasks=tasks.filter(t=>t.status===state.taskFilterStatus);
  return `<div class="page-head"><div><h2>Team Tasks</h2><p>View and update all tasks permitted by your role.</p></div><button class="btn btn-primary" onclick="goTab('work')">+ Assign Task</button></div>
    <section class="card"><div class="attendance"><div class="field"><label>Member</label><select onchange="state.taskFilterMember=this.value;renderApp()"><option value="all">All Members</option>${state.members.map(m=>`<option value="${m.id}" ${state.taskFilterMember===m.id?'selected':''}>${esc(m.name)}</option>`).join('')}</select></div><div class="field"><label>Status</label><select onchange="state.taskFilterStatus=this.value;renderApp()"><option value="all">All Statuses</option>${['Pending','In Progress','Completed','On Hold','Review'].map(s=>`<option ${state.taskFilterStatus===s?'selected':''}>${s}</option>`).join('')}</select></div></div></section>
    <section class="card">${renderTaskTable(tasks)}</section>`;
}

function renderRecords(){
  const records=[...state.attendance].filter(a=>state.recordMember==='all'||a.memberId===state.recordMember).sort((a,b)=>b.workDate.localeCompare(a.workDate));
  return `<div class="page-head"><div><h2>Daily Records</h2><p>Finished and active work days with attendance and task hours.</p></div></div>
    ${canManageTeam()?`<section class="card"><div class="field" style="max-width:300px;margin:0"><label>Filter Member</label><select onchange="state.recordMember=this.value;renderApp()"><option value="all">All Members</option>${state.members.map(m=>`<option value="${m.id}" ${state.recordMember===m.id?'selected':''}>${esc(m.name)} — ${esc(m.employeeId)}</option>`).join('')}</select></div></section>`:''}
    ${records.length?records.map(a=>renderOneDayBlock(a.memberId,a.workDate)).join(''):`<div class="card empty"><div class="emoji">📅</div>No attendance or finished-day records yet.</div>`}`;
}
function renderOneDayBlock(memberId,date){
  const a=attendanceFor(memberId,date)||{};const member=memberById(memberId)||{};const tasks=tasksFor(memberId,date);const p=dateParts(date);const hours=tasks.reduce((s,t)=>s+Number(t.hours||0),0);
  return `<article class="day-block"><header class="day-head"><div class="day-title"><div class="day-num">${esc(p.num)}</div><div><strong>${esc(p.day)} — ${esc(member.name||'Member')}</strong><small>${esc(p.month)} · ${esc(member.employeeId||'')}</small></div></div><div class="day-meta">Login: <strong>${esc(a.loginTime||'—')}</strong> · Logout: <strong>${esc(a.logoutTime||'—')}</strong> · Hours: <strong>${hours.toFixed(1)}</strong></div>${a.finishedAt?`<span class="finished">✓ FINISHED DAY</span>`:`<span class="pill p-progress">ACTIVE</span>`}</header><div class="day-body">${renderTaskTable(tasks)}</div></article>`;
}

function renderSettings(){
  const c=state.company||{};
  return `<div class="page-head"><div><h2>Owner Settings</h2><p>Shared branding, Google Sheets, and Owner security.</p></div></div>
    <section class="grid two-col"><div>
      <section class="card"><div class="card-head"><div><h3>🏢 Company Branding</h3><p>These settings appear on every device.</p></div></div>
        <form class="form-grid" onsubmit="saveCompany(event)"><div class="field wide"><label>Company Name</label><input name="name" value="${esc(c.name||'')}"></div><div class="field wide"><label>Tagline</label><input name="tagline" value="${esc(c.tagline||'')}"></div>
          <div class="field"><label>Primary Color</label><div class="color-row"><input name="primaryColor" type="color" value="${esc(c.primary_color||'#C9A84C')}"><span>${esc(c.primary_color||'')}</span></div></div><div class="field"><label>Header Color</label><div class="color-row"><input name="headerColor" type="color" value="${esc(c.header_color||'#0B1730')}"><span>${esc(c.header_color||'')}</span></div></div><div class="field"><label>Header Gradient</label><div class="color-row"><input name="headerColor2" type="color" value="${esc(c.header_color_2||'#1A3560')}"><span>${esc(c.header_color_2||'')}</span></div></div>
          <div class="field all"><label>Company Logo (shared)</label><div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap"><div class="logo-preview">${c.logo_data_url?`<img src="${esc(c.logo_data_url)}" alt="logo">`:'No logo'}</div><input id="logoUpload" type="file" accept="image/png,image/jpeg,image/svg+xml" onchange="previewLogo(this)"><button type="button" class="btn btn-danger btn-sm" onclick="clearLogo()">Remove Logo</button></div><input type="hidden" name="logoDataUrl" id="logoDataUrl" value="${esc(c.logo_data_url||'')}"></div>
          <div class="field all"><button class="btn btn-primary" type="submit">Save Company Settings</button></div></form></section>
      <section class="card"><div class="card-head"><div><h3>🔐 Change My PIN</h3><p>Use 4–8 digits and keep it private.</p></div></div><form class="form-grid" onsubmit="changeMyPin(event)"><div class="field"><label>Current PIN</label><input name="currentPin" type="password" inputmode="numeric" required></div><div class="field"><label>New PIN</label><input name="newPin" type="password" inputmode="numeric" required></div><div class="field"><label>&nbsp;</label><button class="btn btn-dark" type="submit">Change PIN</button></div></form></section>
    </div><div>
      <section class="card"><div class="card-head"><div><h3>🟢 Automatic Google Sheets Sync</h3><p>Every task is inserted or updated automatically.</p></div></div><form onsubmit="saveSheet(event)"><div class="field"><label>Apps Script Web App URL</label><input name="sheetWebhookUrl" value="${esc(c.sheet_webhook_url||'')}" placeholder="https://script.google.com/macros/s/.../exec"></div><div class="actions"><button class="btn btn-primary" type="submit">Save URL</button><button class="btn btn-light" type="button" onclick="testSheet()">Test Connection</button><a class="btn btn-green" href="/google-apps-script/Code.gs" download>Download Code.gs</a></div></form>${c.sheet_webhook_url?`<div class="success">Google Sheets URL is saved. Task, attendance, and Finish Day changes sync from the server.</div>`:`<div class="notice">Create a Google Sheet, deploy the included Apps Script as a Web App, then paste its /exec URL here.</div>`}</section>
      <section class="card"><div class="card-head"><div><h3>🌍 Multi-Device Status</h3><p>This live version does not use localStorage for business data.</p></div></div><div class="success">✓ Members, tasks, attendance, finished days, notifications, and branding are stored in Supabase and shared across locations.</div><div class="notice">Vercel Environment Variables must remain configured. Never expose the Supabase secret key in this HTML.</div></section>
    </div></section>`;
}
function previewLogo(input){const file=input.files?.[0];if(!file)return;if(file.size>650000)return toast('Logo must be smaller than about 650 KB.','err');const reader=new FileReader();reader.onload=()=>{document.getElementById('logoDataUrl').value=reader.result;toast('Logo selected. Click Save Company Settings.');};reader.readAsDataURL(file)}
function clearLogo(){document.getElementById('logoDataUrl').value='';toast('Logo removed from form. Click Save Company Settings.');}
async function saveCompany(event){event.preventDefault();const f=new FormData(event.target);try{await api('company.update',{method:'PATCH',body:{name:f.get('name'),tagline:f.get('tagline'),primaryColor:f.get('primaryColor'),headerColor:f.get('headerColor'),headerColor2:f.get('headerColor2'),logoDataUrl:f.get('logoDataUrl')}});toast('Company branding saved for all devices.');await loadData(false);}catch(e){toast(e.message,'err')}}
async function saveSheet(event){event.preventDefault();const f=new FormData(event.target);try{await api('company.update',{method:'PATCH',body:{sheetWebhookUrl:f.get('sheetWebhookUrl')}});toast('Google Sheets URL saved.');await loadData(false);}catch(e){toast(e.message,'err')}}
async function testSheet(){try{await api('sheet.test',{method:'POST',body:{}});toast('Google Sheet connection is working.');}catch(e){toast(e.message,'err')}}
async function changeMyPin(event){event.preventDefault();const f=new FormData(event.target);try{await api('member.selfPin',{method:'PATCH',body:{currentPin:f.get('currentPin'),newPin:f.get('newPin')}});event.target.reset();toast('PIN changed successfully.');}catch(e){toast(e.message,'err')}}

function toggleNotifications(){state.notificationsOpen=!state.notificationsOpen;renderApp();if(state.notificationsOpen&&unreadCount())markNotificationsRead();}
function renderNotifications(){return `<aside class="notification-panel"><div class="np-head"><strong>Notifications</strong><button class="btn btn-light btn-sm" onclick="markNotificationsRead()">Mark all read</button></div>${state.notifications.length?state.notifications.map(n=>`<div class="notif ${n.readAt?'':'unread'}"><strong>${n.type==='ring'?'🔔':n.type==='task'?'📋':'ℹ️'} ${esc(n.message)}</strong><time>${esc(formatDateTime(n.createdAt))}</time></div>`).join(''):`<div class="empty">No notifications.</div>`}</aside>`}
async function markNotificationsRead(){try{await api('notifications.read',{method:'POST',body:{ids:state.notifications.filter(n=>!n.readAt).map(n=>n.id)}});state.notifications.forEach(n=>n.readAt=n.readAt||new Date().toISOString());renderApp();}catch(e){toast(e.message,'err')}}
function openRing(){state.modal='ring';renderApp();}
function ringMember(id){state.modal='ring';state.ringRecipient=id;renderApp();}
async function sendRing(event){event.preventDefault();const f=new FormData(event.target);try{await api('ring',{method:'POST',body:{recipientId:f.get('recipientId'),message:f.get('message')}});state.modal=null;state.ringRecipient=null;toast('Ring sent.');renderApp();}catch(e){toast(e.message,'err')}}

function closeModal(){state.modal=null;state.editingTask=null;state.editingMember=null;state.ringRecipient=null;renderApp();}
function renderModal(){
  if(!state.modal)return '';
  if(state.modal==='task'){const t=state.editingTask;return modalWrap('Edit Task',`<form onsubmit="updateTask(event)"><div class="field"><label>Task Name</label><input name="title" value="${esc(t.title)}" required></div><div class="form-grid"><div class="field"><label>Date</label><input name="taskDate" type="date" value="${esc(t.taskDate)}" required></div><div class="field"><label>Hours</label><input name="hours" type="number" min="0" max="24" step=".25" value="${esc(t.hours)}" required></div><div class="field"><label>Status</label><select name="status">${['Pending','In Progress','Completed','On Hold','Review'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="field"><label>Notes</label><textarea name="notes">${esc(t.notes||'')}</textarea></div><div class="actions"><button class="btn btn-light" type="button" onclick="closeModal()">Cancel</button><button class="btn btn-primary">Save Changes</button></div></form>`)}
  if(state.modal==='member'){const managers=state.members.filter(m=>m.role==='manager');return modalWrap('Add Team Member',`<form onsubmit="createMember(event)"><div class="form-grid"><div class="field wide"><label>Full Name</label><input name="name" required></div><div class="field wide"><label>Email</label><input name="email" type="email"></div><div class="field"><label>Role</label><select name="role" onchange="document.getElementById('managerField').style.display=this.value==='sales'?'flex':'none'"><option value="sales">Team Member (Sales)</option><option value="manager">Manager</option></select></div><div class="field"><label>Employee ID</label><input name="employeeId" placeholder="Auto-generated if blank"></div><div class="field"><label>PIN</label><input name="pin" inputmode="numeric" pattern="[0-9]{4,8}" required></div><div class="field" id="managerField"><label>Reports To</label><select name="managerId"><option value="">No Manager</option>${managers.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select></div></div><div class="actions"><button type="button" class="btn btn-light" onclick="closeModal()">Cancel</button><button class="btn btn-primary">Create Member</button></div></form>`)}
  if(state.modal==='memberEdit'){const m=state.editingMember,managers=state.members.filter(x=>x.role==='manager'&&x.id!==m.id);return modalWrap('Manage Member',`<form onsubmit="updateMember(event)"><div class="field"><label>Name</label><input name="name" value="${esc(m.name)}" required></div><div class="field"><label>Email</label><input name="email" type="email" value="${esc(m.email||'')}"></div>${m.role==='sales'?`<div class="field"><label>Reports To</label><select name="managerId"><option value="">No Manager</option>${managers.map(x=>`<option value="${x.id}" ${m.managerId===x.id?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div>`:'<input type="hidden" name="managerId" value="">'}<div class="field"><label>New PIN (leave blank to keep current)</label><input name="pin" inputmode="numeric" pattern="[0-9]{4,8}"></div><label style="display:flex;gap:8px;align-items:center;margin:10px 0 18px"><input name="active" type="checkbox" ${m.active?'checked':''}> Active account</label><div class="actions"><button type="button" class="btn btn-light" onclick="closeModal()">Cancel</button><button class="btn btn-primary">Save Member</button></div></form>`)}
  if(state.modal==='ring'){const recipients=state.members.filter(m=>m.id!==state.user.id);return modalWrap('🔔 Ring Notification',`<form onsubmit="sendRing(event)">${isSales()?`<div class="notice">This ring will be sent directly to the Owner.</div>`:`<div class="field"><label>Ring</label><select name="recipientId" required>${recipients.map(m=>`<option value="${m.id}" ${(state.ringRecipient||'')===m.id?'selected':''}>${esc(m.name)} — ${esc(m.employeeId)}</option>`).join('')}</select></div>`}<div class="field"><label>Message</label><textarea name="message" placeholder="Please check the dashboard…"></textarea></div><div class="actions"><button type="button" class="btn btn-light" onclick="closeModal()">Cancel</button><button class="btn btn-primary">Send Ring</button></div></form>`)}
  return '';
}
function modalWrap(title,body){return `<div class="modal-back" onclick="if(event.target===this)closeModal()"><section class="modal"><div class="modal-head"><h3>${title}</h3><button class="close" onclick="closeModal()">×</button></div>${body}</section></div>`}

window.addEventListener('DOMContentLoaded',async()=>{if(state.token){try{await loadData();startPolling();}catch{renderLogin();}}else renderLogin();});
</script>
</body>
</html>
